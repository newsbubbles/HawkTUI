# HawkTUI Hawk Dark Theme
# The default theme - sleek and professional

[meta]
name = "Hawk Dark"
author = "HawkTUI Team"
version = "1.0.0"

[colors]
background = "#0d1117"
foreground = "#c9d1d9"
accent = "#58a6ff"
accent_secondary = "#a371f7"
success = "#3fb950"
warning = "#d29922"
error = "#f85149"
info = "#58a6ff"
muted = "#8b949e"
highlight = "#388bfd"

[panels]
conversation_bg = "#0d1117"
sidebar_bg = "#161b22"
input_bg = "#21262d"
status_bg = "#30363d"
user_message_bg = "#21262d"
assistant_message_bg = "#161b22"

[borders]
style = "rounded"
color = "#30363d"
focused_color = "#58a6ff"

[syntax]
keyword = "#ff7b72"
string = "#a5d6ff"
comment = "#8b949e"
function = "#d2a8ff"
type = "#79c0ff"
number = "#79c0ff"
operator = "#ff7b72"
variable = "#ffa657"
constant = "#79c0ff"
